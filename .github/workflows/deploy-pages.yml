name: Deploy to GitHub Pages

# Publishes `dist` to branch `gh-pages`. In repo Settings → Pages, set source to
# branch `gh-pages` / folder `/` (root). No GitHub Environments / OIDC setup required.

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    # Normal runtime ~2–5 min. If this is exceeded, the job is stuck — cancel it in the Actions tab and re-run.
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci --no-audit --no-fund

      - name: Confirm VITE_API_URL presence
        env:
          VITE_API_URL: ${{ secrets.VITE_API_URL || vars.VITE_API_URL }}
        run: |
          echo "VITE_API_URL set? $([[ -n \"$VITE_API_URL\" ]] && echo yes || echo no)"

      - name: Build
        env:
          BASE_PATH: /harvested-mvp/
          # Prefer Actions secrets if present; otherwise fall back to repository variables.
          VITE_API_URL: ${{ secrets.VITE_API_URL || vars.VITE_API_URL }}
        run: npm run build

      - name: Deploy dist to gh-pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: dist
          publish_branch: gh-pages
          force_orphan: true
          enable_jekyll: false
          user_name: github-actions[bot]
          user_email: github-actions[bot]@users.noreply.github.com

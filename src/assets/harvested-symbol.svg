<svg viewBox="0 0 120 120" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- 1. Dünner Kreis – einheitliches Waldgrün #4A5D4E -->
  <circle cx="60" cy="60" r="50" stroke="#4A5D4E" stroke-width="1.5" fill="none"/>
  <!-- 2. H – Serif, vollflächig gefüllt -->
  <text x="60" y="80" font-size="54" font-family="Georgia, 'Times New Roman', serif" text-anchor="middle" fill="#4A5D4E" font-weight="bold" letter-spacing="2">H</text>
  <!-- 3. Ranke nur Kontur: entspringt am linken unteren H-Balken, verläuft horizontal durch den Querbalken, dann nach oben/rechts hinter dem rechten Balken -->
  <path d="M 47 78 C 47 70 50 66 54 65 L 68 65 L 72 64 C 76 60 79 52 81 46" stroke="#4A5D4E" stroke-width="1.2" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- 4. Drei kleine Blätter an der Ranke – nur Umriss (stroke), nicht gefüllt -->
  <path d="M 45 75 Q 42 73 45 71 Q 48 73 45 75" stroke="#4A5D4E" stroke-width="0.9" fill="none"/>
  <path d="M 60 65 Q 57 63 60 61 Q 63 63 60 65" stroke="#4A5D4E" stroke-width="0.9" fill="none"/>
  <path d="M 76 50 Q 73 48 76 46 Q 79 48 76 50" stroke="#4A5D4E" stroke-width="0.9" fill="none"/>
  <!-- 5. Schmetterling – feine Kontur, sitzt oben rechts auf der Ranke nahe dem rechten H-Balken -->
  <path d="M 79 43 Q 85 39 87 45 Q 85 49 81 47" stroke="#4A5D4E" stroke-width="0.9" fill="none" stroke-linecap="round"/>
  <path d="M 81 47 Q 77 51 81 55 Q 85 53 87 49" stroke="#4A5D4E" stroke-width="0.9" fill="none" stroke-linecap="round"/>
  <path d="M 79 43 L 81 47 L 81 55" stroke="#4A5D4E" stroke-width="0.75" fill="none" stroke-linecap="round"/>
</svg>
